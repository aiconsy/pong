<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pong</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="app">
      <h1>Pong</h1>
      <div id="scoreboard">
        <span id="player-score">0</span> &mdash; <span id="ai-score">0</span>
      </div>
      <canvas id="game-canvas" width="800" height="500"></canvas>
      <div id="controls">
        <div class="control-card">
          <h2>Pause</h2>
          <p class="hint">Press <kbd>Enter</kbd> to pause / resume.</p>
        </div>

        <div class="control-card">
          <h2>Radio</h2>
          <div class="row">
            <label for="station-select">Station</label>
            <select id="station-select"></select>
          </div>
          <div class="row">
            <label for="station-url">Or stream URL</label>
            <input id="station-url" type="url" placeholder="https://example.com/stream.mp3" />
            <button id="station-load" type="button">Load</button>
          </div>
          <div class="row">
            <audio id="radio-audio" controls preload="none"></audio>
            <span id="radio-status" class="hint"></span>
          </div>
        </div>
      </div>

      <p id="instructions">
        Use <kbd>W</kbd> / <kbd>S</kbd> or <kbd>&uarr;</kbd> / <kbd>&darr;</kbd> to move. Press <kbd>Space</kbd> to start. Press <kbd>Enter</kbd> to pause.
      </p>
    </div>

    <div id="pause-overlay" aria-hidden="true">
      <div id="pause-overlay_card">
        <div id="pause-title">Paused</div>
        <div id="pause-subtitle">Press Enter to resume</div>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
