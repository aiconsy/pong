<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pong</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="app">
      <h1>Pong</h1>
      <div id="scoreboard">
        <span id="player-score">0</span> &mdash; <span id="ai-score">0</span>
      </div>
      <canvas id="game-canvas" width="800" height="500"></canvas>
      <p id="instructions">Use <kbd>W</kbd> / <kbd>S</kbd> or <kbd>&uarr;</kbd> / <kbd>&darr;</kbd> to move. Press <kbd>Space</kbd> to start.</p>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
